spring.application.name=LogiSmart
# Thông tin k?t n?i MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/logistics_db
spring.datasource.username=sa
spring.datasource.password=sapassword

spring.datasource.driver-className=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ???ng d?n truy c?p giao di?n Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
# ???ng d?n file JSON ch?a c?u h́nh OpenAPI
springdoc.api-docs.path=/v3/api-docs
# S?p x?p các API theo th? t? b?ng ch? cái
springdoc.swagger-ui.operationsSorter=alpha